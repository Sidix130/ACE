<!-- Extrait simplifié d'un export AI Studio avec wrappers multiples -->

    <ms-chat-message role="user">
        <div class="message-content">
            <p>Première question</p>
            <p>Deuxième ligne</p>
        </div>
    </ms-chat-message>
</ms-chat-turn>

        <div class="message-content">
            <p>Réponse avec plusieurs paragraphes</p>
            <p>Et encore du texte</p>
        </div>
    </ms-chat-message>
</ms-chat-turn>
